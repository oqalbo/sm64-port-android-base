name: SM64 Android Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---------------- FIX SDL (IMPORTANT) ----------------
      - name: Get SDL (required for this repo)
        run: |
          if [ -f ./getSDL.sh ]; then
            chmod +x ./getSDL.sh
            ./getSDL.sh
          else
            echo "No getSDL.sh found, relying on submodules"
          fi

      - name: Force submodules update
        run: |
          git submodule sync --recursive || true
          git submodule update --init --recursive || true

      # ---------------- VERIFY REAL STRUCTURE ----------------
      - name: Verify SM64 source
        run: |
          test -d app/jni/src || (echo "Missing engine source" && exit 1)
          echo "OK"

      # ---------------- JAVA ----------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- ANDROID ----------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "ndk;25.2.9519653"

      # ---------------- BUILD ----------------
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease --stacktrace

      # ---------------- ARTIFACT ----------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sm64-apk
          path: app/build/outputs/apk/**/*.apk

      # ---------------- RELEASE ----------------
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
