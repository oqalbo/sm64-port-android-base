name: SM64 Android Build (Stable Fix)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: release
        type: choice
        options:
          - release
          - debug

  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- JAVA ----------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- ANDROID SDK ----------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "ndk;25.2.9519653"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ---------------- CACHE (SAFE ONLY) ----------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ---------------- BUILD ----------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew --no-daemon assemble${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }} --stacktrace

      # ---------------- OUTPUT ----------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sm64-apk
          path: app/build/outputs/apk/**/*.apk

      # ---------------- RELEASE ----------------
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
