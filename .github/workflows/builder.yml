name: SM64 Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: debug
        type: choice
        options: [debug, release]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "ndk;25.2.9519653"

      - name: Restore baserom
        env:
          BASEROM_B64: ${{ secrets.BASEROM_B64 }}
        run: |
          test -n "$BASEROM_B64"
          mkdir -p app/jni/src
          echo "$BASEROM_B64" | base64 -d > app/jni/src/baserom.us.z64
          test -s app/jni/src/baserom.us.z64

      - name: Get SDL sources
        run: |
          chmod +x ./getSDL.sh
          ./getSDL.sh

      - name: Native build
        run: |
          cd app/jni/src
          make --jobs 4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Android build
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew --no-daemon assembleRelease --stacktrace
          else
            ./gradlew --no-daemon assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sm64-apk
          path: app/build/outputs/apk/**/*.apk
