name: SM64 Android Build (FINAL FIX)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: release
        type: choice
        options:
          - release
          - debug

  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Init submodules (force fix for SDL)
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      # ---------------- VERIFY SDL ----------------
      - name: Verify SDL exists
        run: |
          if [ ! -f app/jni/SDL/src/atomic/SDL_atomic.c ]; then
            echo "❌ SDL missing - submodules not loaded"
            find app/jni -maxdepth 4 | head -n 200
            exit 1
          fi

      # ---------------- JAVA ----------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- ANDROID SDK ----------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "ndk;25.2.9519653"

      # ---------------- BUILD PERMISSIONS ----------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ---------------- BUILD ----------------
      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew --no-daemon assembleDebug --stacktrace
          else
            ./gradlew --no-daemon assembleRelease --stacktrace
          fi

      # ---------------- ARTIFACT ----------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sm64-apk
          path: app/build/outputs/apk/**/*.apk

      # ---------------- RELEASE ----------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
