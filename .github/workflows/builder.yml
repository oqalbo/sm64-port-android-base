name: Android Build (SM64 Native Port)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------- JAVA ----------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- ANDROID SDK ----------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + Build tools
        run: |
          sdkmanager "ndk;25.2.9519653" "platform-tools" "platforms;android-34"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ---------------- CACHE ----------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ---------------- PERMISSIONS ----------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ---------------- BUILD ----------------
      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      # ---------------- SIGNING ----------------
      # Only works if you add GitHub Secrets:
      # KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD

      - name: Decode Keystore
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "$APK" "${{ secrets.KEY_ALIAS }}"

      # ---------------- OUTPUT ----------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sm64-android-${{ github.event.inputs.build_type || 'release' }}
          path: app/build/outputs/apk/**/**/*.apk

      # ---------------- GITHUB RELEASE ----------------
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
